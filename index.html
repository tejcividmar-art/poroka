<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tadeja & Luka - Poroka</title>

  <!-- NOVA elegantna pisana pisava -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- Elegantna pisava za ostalo besedilo -->
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    body {
  margin: 0;
  font-family: 'Libre Baskerville', serif;
  color: #2c2c2c;
  text-align: center;

  /* OZADJE IZ LOKALNE DATOTEKE */
  background-image: url("ozadje.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  overflow-x: hidden;
}
    @media (max-width: 768px) {
  body {
    background-attachment: scroll;
    }
}

    .flowers {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,165,0,0.25) 0 8%, transparent 9%),
        radial-gradient(circle at 80% 30%, rgba(255,215,0,0.25) 0 10%, transparent 11%),
        radial-gradient(circle at 40% 70%, rgba(34,139,34,0.2) 0 12%, transparent 13%),
        radial-gradient(circle at 70% 80%, rgba(255,140,0,0.2) 0 9%, transparent 10%);
      z-index: -1;
    }

    header {
      padding: 120px;
    }

    /* PISANA IMENA - ELEGANTNEJŠA PISAVA */
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 6.5em;
      margin-bottom: 0;
      font-weight: 400;
      letter-spacing: 1px;
      display: inline-block;
    }

    h2 {
      margin-top: 10px;
      color: #555;
    }

    .countdown {
      font-size: 2em;
      margin: 30px 0;
      color: #d35400;
    }

    .card {
      background: rgba(255, 255, 255, 0.55);
      margin: 20px auto;
      padding: 20px;
      max-width: 600px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.4);
    }

    a {
      color: #1e7a4c;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* PISANI NASLOVI SEKCIJ */
    .script-title {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: 3em;
      color: #444;
      margin-bottom: 10px;
    }

    footer {
      margin: 40px 0;
      font-size: 0.9em;
      color: #666;
    }
   
</body>
</html>
