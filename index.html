<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Najina poroka</title>

<style>
  body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #fdf6f0, #f7ebe5);
    color: #333;
    text-align: center;
  }

  .hero {
    padding: 80px 20px 40px;
  }

  h1 {
    font-size: 56px;
    margin: 0;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 20px;
    margin-top: 10px;
    color: #777;
  }

  .date {
    font-size: 28px;
    margin-top: 20px;
    color: #b48a78;
  }

  .container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
  }

  .card {
    background: white;
    padding: 30px;
    margin: 20px 0;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  h2 {
    color: #b48a78;
    margin-bottom: 10px;
  }

  .time {
    font-size: 20px;
    font-weight: bold;
  }

  .location {
    color: #666;
    margin-top: 5px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: #b48a78;
    margin: 40px auto;
  }

  .footer {
    margin: 60px 0 30px;
    font-size: 14px;
    color: #999;
  }

</style>
</head>

<body>

<div class="hero">
  <h1>Ana & Marko</h1>
  <div class="subtitle">Vabljeni na najino poroko</div>
  <div class="date">4. julij 2026</div>
</div>

<div class="container">

  <div class="card">
    <h2>Cerkveni obred</h2>
    <div class="time">13:00</div>
    <div class="location">Polje</div>
  </div>

  <div class="card">
    <h2>Civilni obred</h2>
    <div class="time">17:00</div>
    <div class="location">Kozolec Pr Jereb</div>
  </div>

  <div class="divider"></div>

  <div class="card">
    <h2>Program dneva</h2>
    <p>13:00 – cerkvena poroka</p>
    <p>17:00 – civilna poroka</p>
  </div>

  <div class="card">
    <h2>Potrditev udeležbe</h2>
    <p>Prosiva, da svojo udeležbo potrdite.</p>
  </div>

</div>

<div class="footer">
  Z veseljem pričakujeva vaš prihod 💛
</div>

</body>
</html>
